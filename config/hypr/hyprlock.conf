# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/scripts/hyprlock/current_wallpaper.png
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# INPUT FIELD (Scaled down from 250x60 to 180x42)
input-field {
    monitor =
    size = 180, 42
    outline_thickness = 2
    dots_size = 0.25 # Scale of input-field height
    dots_spacing = 0.2 
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.4)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">Enter Pass</span></i>
    hide_input = false
    position = 0, -140
    halign = center
    valign = center
}

# Time (Scaled down from 130 to 65)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(216, 222, 233, 0.70)
    font_size = 65
    font_family = SF Pro Display Bold
    position = 0, 160
    halign = center
    valign = center
}

# Day-Month-Date (Scaled down from 30 to 16)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 16
    font_family = SF Pro Display Bold
    position = 0, 100
    halign = center
    valign = center
}

# USER (Scaled down from 250 to 15)
label {
    monitor =
    text = Hi, $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 15
    font_family = SF Pro Display Bold
    position = 0, -65
    halign = center
    valign = center
}

# CURRENT SONG (Scaled down from 18 to 12)
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/hyprlock/songdetail.sh)" 
    color = rgba(255, 255, 255, 0.7)
    font_size = 12
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 30
    halign = center
    valign = bottom
}